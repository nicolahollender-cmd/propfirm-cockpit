// ---------------------------------------------------------------------------
// Local storage helpers (this standalone file has no Claude artifact storage,
// so trades & settings are saved in the browser's localStorage instead)
// ---------------------------------------------------------------------------
function loadLocal(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch (e) { return fallback; }
}
function saveLocal(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* storage unavailable */ }
}

// ---------------------------------------------------------------------------
// Lightweight equity curve chart (no charting library dependency)
// ---------------------------------------------------------------------------
function EquityChart({ curve, startingBalance, targetLine, ddLine, ddLabel }) {
  const width = 800, height = 260, padL = 56, padR = 12, padT = 16, padB = 8;
  const values = curve.map(c => c.balance).concat([startingBalance, targetLine]);
  if (ddLine != null) values.push(ddLine);
  const minV = Math.min(...values), maxV = Math.max(...values);
  const range = (maxV - minV) || 1;
  const pad = range * 0.1;
  const yMin = minV - pad, yMax = maxV + pad;
  const x = (i) => padL + (i / Math.max(1, curve.length - 1)) * (width - padL - padR);
  const y = (v) => padT + (1 - (v - yMin) / (yMax - yMin)) * (height - padT - padB);
  const path = curve.map((c, i) => `${i === 0 ? 'M' : 'L'} ${x(i).toFixed(1)} ${y(c.balance).toFixed(1)}`).join(' ');
  const yTicks = [0, 1, 2, 3, 4];

  return (
    <svg viewBox={`0 0 ${width} ${height}`} className="w-full" style={{ height: 260, display: 'block' }} preserveAspectRatio="none">
      {yTicks.map((i) => {
        const v = yMin + (i / 4) * (yMax - yMin);
        const yy = y(v);
        return (
          <g key={i}>

          </g>
        );
      })}
      <line x1={padL} x2={width - padR} y1={y(startingBalance)} y2={y(startingBalance)} stroke={C.textFaint} strokeDasharray="4 4" />
      <text x={width - padR} y={y(startingBalance) - 4} textAnchor="end" fontSize="10" fill={C.textFaint} fontFamily={FONT_BODY}>Start</text>
      <line x1={padL} x2={width - padR} y1={y(targetLine)} y2={y(targetLine)} stroke={C.green} strokeDasharray="4 4" />
      <text x={width - padR} y={y(targetLine) - 4} textAnchor="end" fontSize="10" fill={C.green} fontFamily={FONT_BODY}>Target</text>
      {ddLine != null && (
        <>
          <line x1={padL} x2={width - padR} y1={y(ddLine)} y2={y(ddLine)} stroke={C.red} strokeDasharray="4 4" />
          <text x={width - padR} y={y(ddLine) + 12} textAnchor="end" fontSize="10" fill={C.red} fontFamily={FONT_BODY}>{ddLabel}</text>
        </>
      )}
      <path d={path} fill="none" stroke={C.amber} strokeWidth="2" />
    </svg>
  );
}

// ---------------------------------------------------------------------------
// Pro licensing — local checksum-validated license keys
// ---------------------------------------------------------------------------
// No backend or third-party API needed: a valid key is any 16-character code
// from LICENSE_ALPHABET, formatted XXXX-XXXX-XXXX-XXXX, where the 16th
// character is a checksum of the first 15 (see isValidLicenseKey below).
// Generate batches of valid keys with the companion license-key-generator
// tool and distribute them however you like (e.g. a GHL workflow that emails
// the next unused key from a pool after a Stripe purchase).
//
// Replace with your checkout link — GHL/Stripe payment link, Gumroad, etc.
const PRO_CHECKOUT_URL = 'https://buy.stripe.com/dRmdRbaTW3Kp4hJarV3Ru0p';

// Excludes 0/1/I/O to avoid visual ambiguity.
const LICENSE_ALPHABET = '23456789ABCDEFGHJKLMNPQRSTUVWXYZ';

function normalizeLicenseKey(key) {
  return String(key || '').toUpperCase().replace(/[^A-Z0-9]/g, '');
}

function isValidLicenseKey(key) {
  const norm = normalizeLicenseKey(key);
  if (norm.length !== 16) return false;
  if (![...norm].every(c => LICENSE_ALPHABET.includes(c))) return false;
  let sum = 0;
  for (let i = 0; i < 15; i++) {
    sum += LICENSE_ALPHABET.indexOf(norm[i]) * (i + 1);
  }
  const expected = LICENSE_ALPHABET[sum % 32];
  return norm[15] === expected;
}

function fmtUSD(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const sign = n < 0 ? '-' : '';
  return `${sign}$${Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
}
function fmtPct(n, digits = 1) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return `${n.toFixed(digits)}%`;
}
function fmtDuration(min) {
  if (min === null || min === undefined || isNaN(min)) return '—';
  if (min < 60) return `${Math.round(min)}m`;
  const h = Math.floor(min / 60);
  const m = Math.round(min % 60);
  return m > 0 ? `${h}h ${m}m` : `${h}h`;
}
function normalizeHeader(h) { return String(h || '').trim().toLowerCase(); }
function findColumn(headers, aliases) {
  const norm = headers.map(normalizeHeader);
  for (const a of aliases) { const i = norm.indexOf(a); if (i !== -1) return headers[i]; }
  for (let i = 0; i < norm.length; i++) { if (aliases.some(a => norm[i].includes(a))) return headers[i]; }
  return null;
}
function parseMoney(str) {
  if (typeof str === 'number') return str;
  let s = String(str ?? '').trim();
  if (!s) return NaN;
  let neg = false;
  if (s.startsWith('(') && s.endsWith(')')) { neg = true; s = s.slice(1, -1); }
  s = s.replace(/[$,\s]/g, '');
  if (s.endsWith('%')) s = s.slice(0, -1);
  let v = parseFloat(s);
  if (isNaN(v)) return NaN;
  return neg ? -Math.abs(v) : v;
}
function normalizeDate(str) {
  const s = String(str ?? '').trim();
  if (!s) return new Date().toISOString().slice(0, 10);
  const d = new Date(s);
  if (!isNaN(d.getTime())) return d.toISOString().slice(0, 10);
  return s.slice(0, 10);
}
function uid() { return `t_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`; }
function todayStr() { return new Date().toISOString().slice(0, 10); }

// ---------------------------------------------------------------------------
// Evaluation engine — walks trades chronologically and checks both
// the daily-loss limit and the overall (static or trailing) drawdown limit
// at every step, the same way a prop firm's risk engine would.
// ---------------------------------------------------------------------------
function evaluate(trades, startingBalance, rules) {
  const sorted = [...trades]
    .map((t, i) => ({ ...t, _seq: i }))
    .sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : a._seq - b._seq));

  let balance = startingBalance;
  let peak = startingBalance;
  let breach = null;
  const curve = [{ index: 0, label: 'Start', balance: startingBalance }];

  let curDate = null, dayStart = startingBalance, dayMin = startingBalance;

  sorted.forEach((t, i) => {
    if (t.date !== curDate) { curDate = t.date; dayStart = balance; dayMin = balance; }
    balance += Number(t.pnl) || 0;
    dayMin = Math.min(dayMin, balance);
    peak = Math.max(peak, balance);
    curve.push({ index: i + 1, label: t.date, balance });

    if (!breach && rules.maxDailyLossPct != null && dayStart > 0) {
      const lossPct = ((dayStart - dayMin) / dayStart) * 100;
      if (lossPct >= rules.maxDailyLossPct) {
        breach = { type: 'daily', date: t.date, detail: `Daily loss reached ${lossPct.toFixed(2)}% on ${t.date} (limit ${rules.maxDailyLossPct}%)` };
      }
    }
    if (!breach && rules.maxOverallDrawdownPct != null) {
      const basis = rules.drawdownType === 'trailing' ? peak : startingBalance;
      const threshold = basis * (1 - rules.maxOverallDrawdownPct / 100);
      if (balance < threshold) {
        breach = { type: 'drawdown', date: t.date, detail: `Balance ${fmtUSD(balance)} fell below the ${rules.drawdownType} max-drawdown line (${fmtUSD(threshold)}) on ${t.date}` };
      }
    }
  });

  // Stats for the most recent trading day (drives the "daily loss" gauge)
  let todayLossAmt = 0, todayLossBasis = balance;
  if (sorted.length) {
    const lastDate = sorted[sorted.length - 1].date;
    let run = startingBalance, dCur = null, dStart = startingBalance, tStart = null, tMin = null;
    sorted.forEach(t => {
      if (t.date !== dCur) { dCur = t.date; dStart = run; }
      run += Number(t.pnl) || 0;
      if (t.date === lastDate) {
        if (tStart === null) tStart = dStart;
        tMin = tMin === null ? run : Math.min(tMin, run);
      }
    });
    todayLossBasis = tStart ?? startingBalance;
    todayLossAmt = Math.max(0, todayLossBasis - (tMin ?? balance));
  }

  const profitTargetAmount = startingBalance * (rules.profitTargetPct / 100);
  const currentProfit = balance - startingBalance;
  const tradingDays = new Set(sorted.map(t => t.date)).size;

  let status = 'active';
  if (breach) status = 'breached';
  else if (currentProfit >= profitTargetAmount && tradingDays >= (rules.minTradingDays || 0)) status = 'passed';

  const ddBasis = rules.drawdownType === 'trailing' ? peak : startingBalance;
  const ddUsed = rules.drawdownType === 'trailing' ? Math.max(0, peak - balance) : Math.max(0, startingBalance - balance);
  const ddAllowed = ddBasis * ((rules.maxOverallDrawdownPct || 0) / 100);
  const dailyAllowed = rules.maxDailyLossPct != null ? todayLossBasis * (rules.maxDailyLossPct / 100) : null;

  return {
    curve, balance, peak, breach, profitTargetAmount, currentProfit, tradingDays, status,
    todayLossAmt, dailyAllowed, ddUsed, ddAllowed, sortedTrades: sorted,
  };
}

function computeStats(trades) {
  if (!trades.length) return null;
  const pnls = trades.map(t => Number(t.pnl) || 0);
  const wins = pnls.filter(p => p > 0);
  const losses = pnls.filter(p => p < 0);
  const total = pnls.reduce((s, p) => s + p, 0);
  const grossWin = wins.reduce((s, p) => s + p, 0);
  const grossLoss = Math.abs(losses.reduce((s, p) => s + p, 0));
  const durations = trades.map(t => t.durationMin).filter(d => d != null && !isNaN(d));
  return {
    count: trades.length,
    winRate: (wins.length / trades.length) * 100,
    avgWin: wins.length ? grossWin / wins.length : 0,
    avgLoss: losses.length ? -grossLoss / losses.length : 0,
    profitFactor: grossLoss > 0 ? grossWin / grossLoss : (grossWin > 0 ? Infinity : 0),
    total,
    best: Math.max(...pnls),
    worst: Math.min(...pnls),
    avgDurationMin: durations.length ? durations.reduce((s, d) => s + d, 0) / durations.length : null,
    durationCount: durations.length,
  };
}

// ---------------------------------------------------------------------------
// Consistency check — many firms require that no single trading day account
// for more than ~40-50% of total profit before payout.
// ---------------------------------------------------------------------------
function computeConsistency(trades, totalProfit) {
  if (!trades.length) return { bestDayDate: null, bestDayProfit: 0, consistencyPct: null, totalProfit };
  const byDate = {};
  trades.forEach(t => { byDate[t.date] = (byDate[t.date] || 0) + (Number(t.pnl) || 0); });
  let bestDate = null, bestProfit = -Infinity;
  Object.entries(byDate).forEach(([date, pnl]) => {
    if (pnl > bestProfit) { bestProfit = pnl; bestDate = date; }
  });
  const consistencyPct = totalProfit > 0 && bestProfit > 0 ? (bestProfit / totalProfit) * 100 : null;
  return { bestDayDate: bestDate, bestDayProfit: bestProfit, consistencyPct, totalProfit };
}

// ---------------------------------------------------------------------------
// Performance Coach — builds the analysis context for either an AI-generated
// review (via the Anthropic API, available when running inside Claude) or a
// rule-based local summary (used as a fallback, e.g. in the standalone HTML
// build where no API access is available).
// ---------------------------------------------------------------------------
function buildCoachContext(scopedTrades, stats, evalResult, rules, scopeLabel) {
  const dailyAllowed = evalResult.dailyAllowed;
  const dailyLossPct = dailyAllowed ? (evalResult.todayLossAmt / dailyAllowed) * 100 : null;
  const ddPct = evalResult.ddAllowed > 0 ? (evalResult.ddUsed / evalResult.ddAllowed) * 100 : 0;
  const profitPct = evalResult.profitTargetAmount > 0 ? (Math.max(0, evalResult.currentProfit) / evalResult.profitTargetAmount) * 100 : 0;

  const data = {
    scopeLabel,
    tradeCount: stats ? stats.count : 0,
    winRate: stats ? stats.winRate : 0,
    avgWin: stats ? stats.avgWin : 0,
    avgLoss: stats ? stats.avgLoss : 0,
    profitFactor: stats ? stats.profitFactor : 0,
    totalPnl: stats ? stats.total : 0,
    avgDurationMin: stats ? stats.avgDurationMin : null,
    durationCount: stats ? stats.durationCount : 0,
    currentProfit: evalResult.currentProfit,
    profitTargetAmount: evalResult.profitTargetAmount,
    profitPct,
    todayLossAmt: evalResult.todayLossAmt,
    dailyAllowed,
    dailyLossPct,
    ddUsed: evalResult.ddUsed,
    ddAllowed: evalResult.ddAllowed,
    ddPct,
    status: evalResult.status,
    breachDetail: evalResult.breach ? evalResult.breach.detail : null,
    firmName: rules.name,
  };

  const tradeLines = scopedTrades.map(t => {
    const parts = [
      t.date, `${t.symbol} ${t.side}`, `size ${t.size ?? '—'}`,
      `entry ${t.entry ?? '—'}`, `sl ${t.sl ?? '—'}`, `tp1 ${t.tp1 ?? '—'}`, `tp2 ${t.tp2 ?? '—'}`, `exit ${t.exit ?? '—'}`,
      `P&L ${fmtUSD(t.pnl)}`,
    ];
    if (t.durationMin != null) parts.push(`duration ${fmtDuration(t.durationMin)}`);
    if (t.notes) parts.push(`feeling: ${t.notes}`);
    return parts.join(' | ');
  }).join('\n');

  const prompt = `You are a trading performance coach reviewing a prop-firm evaluation account on the rule set "${data.firmName}".

Account stats for ${scopeLabel}:
- Trades taken: ${data.tradeCount}
- Win rate: ${data.winRate.toFixed(1)}%
- Average winning trade: ${fmtUSD(data.avgWin)}
- Average losing trade: ${fmtUSD(data.avgLoss)}
- Profit factor: ${data.profitFactor === Infinity ? '∞' : data.profitFactor.toFixed(2)}
- Net P&L: ${fmtUSD(data.totalPnl)}
- Average trade duration: ${data.durationCount ? fmtDuration(data.avgDurationMin) : 'not recorded'}

Evaluation status:
- Account status: ${data.status}
- Progress to profit target: ${fmtUSD(Math.max(0, data.currentProfit))} of ${fmtUSD(data.profitTargetAmount)} (${data.profitPct.toFixed(0)}%)
${data.dailyAllowed != null ? `- Daily loss budget used: ${fmtUSD(data.todayLossAmt)} of ${fmtUSD(data.dailyAllowed)} (${data.dailyLossPct.toFixed(0)}%)` : '- No daily loss limit on this rule set'}
- Drawdown budget used: ${fmtUSD(data.ddUsed)} of ${fmtUSD(data.ddAllowed)} (${data.ddPct.toFixed(0)}%)
${data.breachDetail ? `- BREACH: ${data.breachDetail}` : ''}

Individual trades:
${tradeLines || '(none logged)'}

Write a short performance review (under 250 words) using **bold** section headers exactly as named:
**Summary** — 1-2 sentences on the overall result and risk usage.
**What's working** — 2-3 bullet points ("- ...") citing specific numbers from above.
**What to improve** — 2-3 bullet points ("- ...") citing specific numbers, focused on concrete, actionable changes.
**Focus for next session** — one specific, concrete focus.

Be direct and specific, grounded only in the numbers given. Do not invent details. If there are zero trades, say so and suggest logging trades to enable analysis.`;

  return { prompt, data };
}

function localCoachSummary(d) {
  if (d.tradeCount === 0) {
    return `**Summary**\n\nNo trades logged for ${d.scopeLabel}. Log a few trades in the journal (or import a CSV) to get a performance breakdown here.`;
  }

  const lines = [];
  lines.push('**Summary**');
  lines.push(
    `For ${d.scopeLabel} you took ${d.tradeCount} trade${d.tradeCount === 1 ? '' : 's'} for a net result of ${fmtUSD(d.totalPnl)} ` +
    `at a ${d.winRate.toFixed(0)}% win rate. ` +
    `Drawdown budget used: ${d.ddPct.toFixed(0)}%` +
    (d.dailyAllowed != null ? `, daily loss budget used: ${d.dailyLossPct.toFixed(0)}%.` : '.')
  );

  const strengths = [];
  const issues = [];

  if (d.profitFactor >= 1.5) strengths.push(`Profit factor of ${d.profitFactor === Infinity ? '∞' : d.profitFactor.toFixed(2)} — winners are comfortably outweighing losers.`);
  if (d.winRate >= 50) strengths.push(`${d.winRate.toFixed(0)}% win rate is solid for this sample.`);
  if (d.avgWin > 0 && Math.abs(d.avgWin) > Math.abs(d.avgLoss) * 1.3) strengths.push(`Average win (${fmtUSD(d.avgWin)}) is well ahead of average loss (${fmtUSD(d.avgLoss)}) — good reward-to-risk.`);
  if (d.dailyAllowed != null && d.dailyLossPct < 50) strengths.push(`Only ${d.dailyLossPct.toFixed(0)}% of the daily loss budget used — plenty of room to operate calmly.`);
  if (d.ddPct < 30) strengths.push(`Drawdown usage at ${d.ddPct.toFixed(0)}% — account health is in good shape.`);

  if (d.profitFactor < 1 && d.tradeCount >= 3) issues.push(`Profit factor is below 1.00 (${d.profitFactor.toFixed(2)}) — losses outweighed wins overall.`);
  if (d.avgLoss < 0 && Math.abs(d.avgLoss) > Math.abs(d.avgWin) * 1.3) issues.push(`Average loss (${fmtUSD(d.avgLoss)}) is significantly larger than average win (${fmtUSD(d.avgWin)}) — tighten stops or cut losers earlier.`);
  if (d.winRate < 40 && d.tradeCount >= 5) issues.push(`Win rate of ${d.winRate.toFixed(0)}% is low for ${d.tradeCount} trades — review entry criteria before increasing frequency.`);
  if (d.dailyAllowed != null && d.dailyLossPct >= 80) issues.push(`${d.dailyLossPct.toFixed(0)}% of today's loss budget is used — strongly consider stopping for the day.`);
  if (d.ddPct >= 70) issues.push(`Overall drawdown usage is at ${d.ddPct.toFixed(0)}% — reduce risk per trade until the equity curve recovers.`);
  if (d.durationCount >= 3 && d.avgDurationMin != null && d.avgDurationMin < 5 && d.tradeCount >= 5) issues.push(`Average trade duration is just ${fmtDuration(d.avgDurationMin)} across ${d.tradeCount} trades — this pace can signal overtrading or revenge trading.`);
  if (d.status === 'breached' && d.breachDetail) issues.push(`This account has breached its rules (${d.breachDetail}) — treat further trades here as practice rather than a recovery attempt.`);

  if (strengths.length) {
    lines.push("**What's working**");
    lines.push(strengths.map(s => `- ${s}`).join('\n'));
  }
  if (issues.length) {
    lines.push('**What to improve**');
    lines.push(issues.map(s => `- ${s}`).join('\n'));
  } else {
    lines.push(`No major red flags in the numbers for ${d.scopeLabel} — keep executing the plan.`);
  }

  lines.push('**Focus for next session**');
  lines.push(issues[0] || strengths[0] || 'Keep journaling consistently — patterns become clearer with more data.');

  return lines.join('\n\n');
}

function renderInline(text) {
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((part, i) => {
    if (part.startsWith('**') && part.endsWith('**')) {
      return <strong key={i} style={{ color: C.text }}>{part.slice(2, -2)}</strong>;
    }
    return <React.Fragment key={i}>{part}</React.Fragment>;
  });
}

function CoachOutput({ text }) {
  const blocks = text.split(/\n\n+/);
  return (
    <div className="space-y-3 text-sm leading-relaxed">
      {blocks.map((block, i) => {
        const lines = block.split('\n').filter(Boolean);
        const isHeading = lines.length === 1 && /^\*\*.+\*\*$/.test(lines[0].trim());
        if (isHeading) {
          return <div key={i} className="text-xs uppercase tracking-[0.2em] pt-1 first:pt-0" style={{ color: C.amber, fontFamily: FONT_BODY }}>{lines[0].trim().slice(2, -2)}</div>;
        }
        const isList = lines.length > 0 && lines.every(l => l.trim().startsWith('- '));
        if (isList) {
          return (
            <ul key={i} className="space-y-1.5 list-disc pl-5" style={{ color: C.textDim }}>
              {lines.map((l, j) => <li key={j}>{renderInline(l.trim().slice(2))}</li>)}
            </ul>
          );
        }
        return <p key={i} style={{ color: C.textDim }}>{renderInline(block)}</p>;
      })}
    </div>
  );
}

  const map = {
    passed: { color: C.green, label: 'TARGET HIT', Icon: CheckCircle2 },
    breached: { color: C.red, label: 'BREACHED', Icon: AlertTriangle },
    active: { color: C.amber, label: 'IN PROGRESS', Icon: Gauge },
  };
  const m = map[status];
  const { Icon } = m;
  return (
    <div className="flex flex-col items-end gap-1.5">
      <div className="flex items-center gap-2 px-3 py-1.5 rounded-full" style={{ background: `${m.color}1A`, border: `1px solid ${m.color}55` }}>
        <Icon size={14} style={{ color: m.color }} />
        <span className="text-xs font-semibold tracking-widest" style={{ color: m.color, fontFamily: FONT_BODY }}>{m.label}</span>
      </div>
      {breach && <span className="text-[11px] max-w-[280px] text-right leading-snug" style={{ color: C.textDim }}>{breach.detail}</span>}
    </div>
  );
}

// ---------------------------------------------------------------------------
// ProGate — blurs and locks a feature behind a Pro license key
// ---------------------------------------------------------------------------
function ProGate({ unlocked, title, onUnlock, children }) {
  if (unlocked) return <>{children}</>;
  return (
    <div className="relative rounded-lg overflow-hidden">
      <div className="opacity-25 pointer-events-none select-none" style={{ filter: 'blur(3px)' }}>
        {children}
      </div>
      <div className="absolute inset-0 flex flex-col items-center justify-center gap-2 px-4 py-6 text-center" style={{ background: `${C.bg}CC` }}>
        <Lock size={18} style={{ color: C.amber }} />
        <div className="text-sm font-semibold" style={{ color: C.text, fontFamily: FONT_DISPLAY }}>{title}</div>
        <div className="text-xs max-w-xs" style={{ color: C.textDim }}>This is a Pro feature — unlock it with a license key.</div>
        <button onClick={onUnlock} className="mt-1 text-xs px-3 py-1.5 rounded-md font-semibold" style={{ background: C.amber, color: '#1A1404' }}>
          Enter license key
        </button>
      </div>
    </div>
  );
}

function FieldLabel({ children }) {
  return <label className="block text-[11px] uppercase tracking-[0.15em] mb-1" style={{ color: C.textDim, fontFamily: FONT_BODY }}>{children}</label>;
}

const inputStyle = {
  background: C.panel2,
  border: `1px solid ${C.border}`,
  color: C.text,
  fontFamily: FONT_MONO,
};
const inputClass = 'w-full rounded-md px-3 py-2 text-sm outline-none focus:ring-2';

// ---------------------------------------------------------------------------
// Main app
// ---------------------------------------------------------------------------
function App() {
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState('dashboard');
  const [firmId, setFirmId] = useState('ftmo_p1');
  const [rules, setRules] = useState({ ...FIRM_PRESETS.ftmo_p1 });
  const [startingBalance, setStartingBalance] = useState(100000);
  const [trades, setTrades] = useState([]);
  const [importMsg, setImportMsg] = useState(null);

  // Pro license
  const [licenseUnlocked, setLicenseUnlocked] = useState(false);
  const [licenseKey, setLicenseKey] = useState('');
  const [licenseMessage, setLicenseMessage] = useState(null);

  // Load (persisted in this browser via localStorage)
  useEffect(() => {
    const s = loadLocal('pf-settings', null);
    if (s) {
      if (s.firmId) setFirmId(s.firmId);
      if (s.rules) setRules(s.rules);
      if (s.startingBalance != null) setStartingBalance(s.startingBalance);
    }
    const t = loadLocal('pf-trades', null);
    if (t) setTrades(t);
    setLoaded(true);
  }, []);

  // Save
  useEffect(() => {
    if (!loaded) return;
    saveLocal('pf-settings', { firmId, rules, startingBalance });
  }, [firmId, rules, startingBalance, loaded]);
  useEffect(() => {
    if (!loaded) return;
    saveLocal('pf-trades', trades);
  }, [trades, loaded]);

  // Load license (persisted via localStorage)
  useEffect(() => {
    const l = loadLocal('pf-license', null);
    if (l) {
      if (l.unlocked) setLicenseUnlocked(true);
      if (l.key) setLicenseKey(l.key);
    }
  }, []);

  // Save license
  useEffect(() => {
    saveLocal('pf-license', { key: licenseKey, unlocked: licenseUnlocked });
  }, [licenseKey, licenseUnlocked]);

  function verifyLicense() {
    const key = licenseKey.trim();
    if (!key) {
      setLicenseMessage({ type: 'error', text: 'Enter a license key first.' });
      return;
    }
    if (isValidLicenseKey(key)) {
      setLicenseKey(normalizeLicenseKey(key));
      setLicenseUnlocked(true);
      setLicenseMessage({ type: 'success', text: 'License key accepted — Pro features unlocked. Thank you!' });
    } else {
      setLicenseUnlocked(false);
      setLicenseMessage({ type: 'error', text: "That key doesn't look right — double-check it against your purchase email." });
    }
  }

  function removeLicense() {
    setLicenseUnlocked(false);
    setLicenseKey('');
    setLicenseMessage(null);
  }

  const evalResult = useMemo(() => evaluate(trades, startingBalance, rules), [trades, startingBalance, rules]);
  const stats = useMemo(() => computeStats(trades), [trades]);
  const consistency = useMemo(() => computeConsistency(trades, evalResult.currentProfit), [trades, evalResult.currentProfit]);

  // -------------------------------------------------------------------------
  // Performance coach
  // -------------------------------------------------------------------------
  const [coachScope, setCoachScope] = useState('today');
  const [coachLoading, setCoachLoading] = useState(false);
  const [coachSummary, setCoachSummary] = useState(null);
  const [coachSource, setCoachSource] = useState(null);

  const latestTradeDate = trades.length ? [...trades].map(t => t.date).sort().slice(-1)[0] : null;
  const scopedTrades = useMemo(() => {
    if (coachScope === 'today') return trades.filter(t => t.date === latestTradeDate);
    return trades;
  }, [trades, coachScope, latestTradeDate]);
  const scopeLabel = coachScope === 'today'
    ? (latestTradeDate ? `today's session (${latestTradeDate})` : "today's session")
    : 'all logged trades';

  async function generateSummary() {
    setCoachLoading(true);
    setCoachSummary(null);
    setCoachSource(null);
    const scopedStats = computeStats(scopedTrades);
    const { prompt, data } = buildCoachContext(scopedTrades, scopedStats, evalResult, rules, scopeLabel);
    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }],
        }),
      });
      if (!resp.ok) throw new Error('API error');
      const json = await resp.json();
      const text = (json.content || []).filter(b => b.type === 'text').map(b => b.text).join('\n').trim();
      if (!text) throw new Error('Empty response');
      setCoachSummary(text);
      setCoachSource('ai');
    } catch (e) {
      setCoachSummary(localCoachSummary(data));
      setCoachSource('local');
    } finally {
      setCoachLoading(false);
    }
  }

  // -------------------------------------------------------------------------
  // Trade journal handlers
  // -------------------------------------------------------------------------
  const [newTrade, setNewTrade] = useState({
    date: todayStr(), symbol: '', side: 'Buy', size: '', entry: '', sl: '', tp1: '', tp2: '', exit: '', pnl: '', durationMin: '', notes: '',
  });
  function addTrade() {
    const pnl = parseMoney(newTrade.pnl);
    if (isNaN(pnl)) return;
    setTrades(prev => [...prev, {
      id: uid(),
      date: newTrade.date || todayStr(),
      symbol: newTrade.symbol || '—',
      side: newTrade.side,
      size: newTrade.size === '' ? null : parseFloat(newTrade.size),
      entry: newTrade.entry === '' ? null : parseFloat(newTrade.entry),
      sl: newTrade.sl === '' ? null : parseFloat(newTrade.sl),
      tp1: newTrade.tp1 === '' ? null : parseFloat(newTrade.tp1),
      tp2: newTrade.tp2 === '' ? null : parseFloat(newTrade.tp2),
      exit: newTrade.exit === '' ? null : parseFloat(newTrade.exit),
      pnl,
      durationMin: newTrade.durationMin === '' ? null : parseFloat(newTrade.durationMin),
      notes: newTrade.notes,
    }]);
    setNewTrade({ date: todayStr(), symbol: '', side: 'Buy', size: '', entry: '', sl: '', tp1: '', tp2: '', exit: '', pnl: '', durationMin: '', notes: '' });
  }
  function removeTrade(id) {
    setTrades(prev => prev.filter(t => t.id !== id));
  }
  function handleCSV(file) {
    setImportMsg(null);
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: (results) => {
        const headers = results.meta.fields || [];
        const dateCol = findColumn(headers, COLUMN_ALIASES.date);
        const symbolCol = findColumn(headers, COLUMN_ALIASES.symbol);
        const sideCol = findColumn(headers, COLUMN_ALIASES.side);
        const sizeCol = findColumn(headers, COLUMN_ALIASES.size);
        const entryCol = findColumn(headers, COLUMN_ALIASES.entry);
        const exitCol = findColumn(headers, COLUMN_ALIASES.exit);
        const pnlCol = findColumn(headers, COLUMN_ALIASES.pnl);
        const openTimeCol = findColumn(headers, COLUMN_ALIASES.openTime);
        const closeTimeCol = findColumn(headers, COLUMN_ALIASES.closeTime);
        const durationCol = findColumn(headers, COLUMN_ALIASES.duration);
        const slCol = findColumn(headers, COLUMN_ALIASES.sl);
        const tp1Col = findColumn(headers, COLUMN_ALIASES.tp1);
        const tp2Col = findColumn(headers, COLUMN_ALIASES.tp2);
        const feelingCol = findColumn(headers, COLUMN_ALIASES.feeling);

        if (!pnlCol) {
          setImportMsg({ type: 'error', text: 'No profit/loss column found. Expected a header like "P&L", "Profit", or "Net P&L".' });
          return;
        }
        const imported = [];
        results.data.forEach(row => {
          const pnl = parseMoney(row[pnlCol]);
          if (isNaN(pnl)) return;

          let durationMin = null;
          if (durationCol) {
            const v = parseFloat(String(row[durationCol]).replace(/[^0-9.]/g, ''));
            if (!isNaN(v)) durationMin = v;
          } else if (openTimeCol && closeTimeCol) {
            const start = new Date(row[openTimeCol]);
            const end = new Date(row[closeTimeCol]);
            if (!isNaN(start.getTime()) && !isNaN(end.getTime())) {
              const diff = (end.getTime() - start.getTime()) / 60000;
              if (diff >= 0) durationMin = diff;
            }
          }

          imported.push({
            id: uid(),
            date: dateCol ? normalizeDate(row[dateCol]) : todayStr(),
            symbol: symbolCol ? String(row[symbolCol] || '—') : '—',
            side: sideCol ? String(row[sideCol] || '—') : '—',
            size: sizeCol ? (parseFloat(row[sizeCol]) || null) : null,
            entry: entryCol ? (parseMoney(row[entryCol]) || null) : null,
            sl: slCol ? (parseMoney(row[slCol]) || null) : null,
            tp1: tp1Col ? (parseMoney(row[tp1Col]) || null) : null,
            tp2: tp2Col ? (parseMoney(row[tp2Col]) || null) : null,
            exit: exitCol ? (parseMoney(row[exitCol]) || null) : null,
            pnl,
            durationMin,
            notes: feelingCol ? String(row[feelingCol] || '') : 'Imported',
          });
        });
        if (!imported.length) {
          setImportMsg({ type: 'error', text: 'No valid rows found in that file.' });
          return;
        }
        setTrades(prev => [...prev, ...imported]);
        setImportMsg({ type: 'success', text: `Imported ${imported.length} trade${imported.length === 1 ? '' : 's'}.` });
      },
      error: (err) => setImportMsg({ type: 'error', text: `Could not read CSV: ${err.message}` }),
    });
  }

  // -------------------------------------------------------------------------
  // Calculator state
  // -------------------------------------------------------------------------
  const [calcBalance, setCalcBalance] = useState(null);
  const [calcRiskPct, setCalcRiskPct] = useState(1);
  const [calcStopLoss, setCalcStopLoss] = useState(20);
  const [calcPipValue, setCalcPipValue] = useState(10);
  const [tradesToSurvive, setTradesToSurvive] = useState(3);

  const effectiveBalance = calcBalance != null ? calcBalance : evalResult.balance;
  const riskAmount = effectiveBalance * (calcRiskPct / 100);
  const positionSize = calcStopLoss > 0 && calcPipValue > 0 ? riskAmount / (calcStopLoss * calcPipValue) : 0;

  const remainingDaily = evalResult.dailyAllowed != null ? Math.max(0, evalResult.dailyAllowed - evalResult.todayLossAmt) : null;
  const remainingDD = Math.max(0, evalResult.ddAllowed - evalResult.ddUsed);
  const tradesLeftDaily = remainingDaily != null && riskAmount > 0 ? Math.floor(remainingDaily / riskAmount) : null;
  const tradesLeftDD = riskAmount > 0 ? Math.floor(remainingDD / riskAmount) : null;

  // Recommended max risk per trade: the firm's loss limits, split across a
  // number of trades you'd want to be able to survive in a losing streak.
  const survive = Math.max(1, tradesToSurvive || 1);
  const maxRiskFromDaily = evalResult.dailyAllowed != null ? evalResult.dailyAllowed / survive : null;
  const maxRiskFromDD = evalResult.ddAllowed > 0 ? evalResult.ddAllowed / survive : null;
  const riskCandidates = [maxRiskFromDaily, maxRiskFromDD].filter(v => v != null && v > 0);
  const recommendedMaxRisk = riskCandidates.length ? Math.min(...riskCandidates) : null;
  const recommendedMaxRiskPct = recommendedMaxRisk != null && effectiveBalance > 0 ? (recommendedMaxRisk / effectiveBalance) * 100 : null;
  const bindingConstraint = recommendedMaxRisk != null && recommendedMaxRisk === maxRiskFromDaily ? 'daily loss limit' : 'max drawdown limit';

  // -------------------------------------------------------------------------
  // Settings handlers
  // -------------------------------------------------------------------------
  function handleFirmChange(id) {
    setFirmId(id);
    setRules({ ...FIRM_PRESETS[id] });
  }
  function resetAll() {
    if (!window.confirm('This clears all trades and resets settings to FTMO defaults. Continue?')) return;
    setTrades([]);
    handleFirmChange('ftmo_p1');
    setStartingBalance(100000);
  }

  // -------------------------------------------------------------------------
  // Derived display values
  // -------------------------------------------------------------------------
  const profitValue = Math.max(0, evalResult.currentProfit);
  const tradingDaysMax = Math.max(rules.minTradingDays || 0, 1);
  const ddThresholdValue = startingBalance - (rules.drawdownType === 'static'
    ? startingBalance * ((rules.maxOverallDrawdownPct || 0) / 100)
    : evalResult.peak * ((rules.maxOverallDrawdownPct || 0) / 100) - (evalResult.peak - startingBalance));

  const tabs = [
    { id: 'dashboard', label: 'Dashboard', Icon: LayoutDashboard },
    { id: 'coach', label: 'Performance Coach', Icon: Sparkles },
    { id: 'calculator', label: 'Position Calculator', Icon: Calculator },
    { id: 'journal', label: 'Trade Journal', Icon: BookOpen },
    { id: 'settings', label: 'Rules & Settings', Icon: SettingsIcon },
  ];

  return (
    <div style={{ background: C.bg, color: C.text, fontFamily: FONT_BODY, minHeight: '100%' }} className="p-4 md:p-6">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap');
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        ::selection { background: ${C.amber}55; }
      `}</style>

      {/* Header */}
      <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-4 mb-5">
        <div className="flex items-center gap-3">
          <img
            src={LOGO_DATA_URI}
            alt="NextGen Investment Group logo"
            className="w-16 h-16 md:w-20 md:h-20 rounded-xl shrink-0 object-cover"
            style={{ border: `1.5px solid ${C.amber}40` }}
          />
          <div>
            <div className="text-[11px] uppercase tracking-[0.35em] mb-1" style={{ color: C.amber, fontFamily: FONT_BODY }}>Prop Firm</div>
            <h1 className="text-2xl md:text-3xl font-bold leading-none" style={{ fontFamily: FONT_DISPLAY }}>Evaluation Cockpit</h1>
            <div className="mt-1 text-sm" style={{ color: C.textDim }}>{rules.name || FIRM_PRESETS[firmId]?.name}</div>
          </div>
        </div>
        <div className="flex flex-col items-end gap-2">
          <StatusPill status={evalResult.status} breach={evalResult.breach} />
          {licenseUnlocked ? (
            <span className="flex items-center gap-1 text-[10px] font-semibold px-2 py-0.5 rounded-full tracking-widest" style={{ background: `${C.amber}1A`, color: C.amber, border: `1px solid ${C.amber}55` }}>
              <Sparkles size={11} /> PRO
            </span>
          ) : (
            <button onClick={() => setTab('settings')} className="flex items-center gap-1 text-[10px] font-semibold px-2 py-0.5 rounded-full tracking-widest" style={{ color: C.textDim, border: `1px solid ${C.border}` }}>
              <Lock size={11} /> Unlock Pro
            </button>
          )}
        </div>
      </div>

      {/* Tabs */}
      <div className="flex gap-1 mb-5 overflow-x-auto pb-1" style={{ borderBottom: `1px solid ${C.border}` }}>
        {tabs.map(({ id, label, Icon }) => (
          <button
            key={id}
            onClick={() => setTab(id)}
            className="flex items-center gap-2 px-3 md:px-4 py-2.5 text-sm font-medium whitespace-nowrap transition-colors"
            style={{
              color: tab === id ? C.amber : C.textDim,
              borderBottom: tab === id ? `2px solid ${C.amber}` : '2px solid transparent',
              fontFamily: FONT_BODY,
            }}
          >
            <Icon size={15} />
            {label}
          </button>
        ))}
      </div>

      {/* ----------------------------------------------------------------- */}
      {/* Dashboard */}
      {/* ----------------------------------------------------------------- */}
      {tab === 'dashboard' && (
        <div className="space-y-5">
          {/* Top summary strip */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
            {[
              { label: 'Starting Balance', value: fmtUSD(startingBalance) },
              { label: 'Current Balance', value: fmtUSD(evalResult.balance), color: evalResult.balance >= startingBalance ? C.green : C.red },
              { label: 'Profit / Loss', value: fmtUSD(evalResult.currentProfit), color: evalResult.currentProfit >= 0 ? C.green : C.red },
              { label: 'Trading Days', value: evalResult.tradingDays },
            ].map((c, i) => (
              <div key={i} className="rounded-lg p-4" style={{ background: C.panel, border: `1px solid ${C.border}` }}>
                <div className="text-[11px] uppercase tracking-[0.2em] mb-1" style={{ color: C.textDim }}>{c.label}</div>
                <div className="text-xl font-semibold" style={{ fontFamily: FONT_MONO, color: c.color || C.text }}>{c.value}</div>
              </div>
            ))}
          </div>

          {/* Trade performance strip */}
          <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
            {[
              { label: 'Number of Trades', value: stats ? stats.count : 0 },
              { label: 'Win Rate', value: stats ? fmtPct(stats.winRate) : '—' },
              { label: 'Avg Winning Trade', value: stats ? fmtUSD(stats.avgWin) : '—', color: C.green },
              { label: 'Avg Losing Trade', value: stats ? fmtUSD(stats.avgLoss) : '—', color: C.red },
              { label: 'Avg Trade Duration', value: stats && stats.durationCount ? fmtDuration(stats.avgDurationMin) : '—' },
            ].map((c, i) => (
              <div key={i} className="rounded-lg p-4" style={{ background: C.panel, border: `1px solid ${C.border}` }}>
                <div className="text-[11px] uppercase tracking-[0.2em] mb-1" style={{ color: C.textDim }}>{c.label}</div>
                <div className="text-xl font-semibold" style={{ fontFamily: FONT_MONO, color: c.color || C.text }}>{c.value}</div>
              </div>
            ))}
          </div>
          {stats && !stats.durationCount && (
            <p className="text-xs -mt-2" style={{ color: C.textFaint }}>
              Avg trade duration shows once trades include timing data — add it via "Duration (min)" when logging a trade, or import a CSV with open/close time columns.
            </p>
          )}

          {/* Gauges */}
          <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-3">
            <TapeGauge
              label="Profit Target"
              value={profitValue}
              max={evalResult.profitTargetAmount}
              mode="progress"
              valueLabel={`${fmtPct((profitValue / (evalResult.profitTargetAmount || 1)) * 100)}`}
              capLabel={fmtUSD(evalResult.profitTargetAmount)}
              sub={`${fmtUSD(profitValue)} of ${fmtUSD(evalResult.profitTargetAmount)} target (${rules.profitTargetPct}%)`}
            />
            {rules.maxDailyLossPct != null ? (
              <TapeGauge
                label="Daily Loss Used"
                value={evalResult.todayLossAmt}
                max={evalResult.dailyAllowed}
                mode="risk"
                valueLabel={fmtPct((evalResult.todayLossAmt / (evalResult.dailyAllowed || 1)) * 100)}
                capLabel={`${rules.maxDailyLossPct}%`}
                sub={`${fmtUSD(evalResult.todayLossAmt)} used of ${fmtUSD(evalResult.dailyAllowed)} today's budget`}
              />
            ) : (
              <div className="rounded-lg p-4 flex flex-col justify-center" style={{ background: C.panel, border: `1px solid ${C.border}` }}>
                <div className="text-[11px] uppercase tracking-[0.2em] mb-2" style={{ color: C.textDim }}>Daily Loss Limit</div>
                <div className="text-sm" style={{ color: C.textDim }}>No daily loss limit for this firm's rule set.</div>
              </div>
            )}
            <TapeGauge
              label={`Max Drawdown (${rules.drawdownType})`}
              value={evalResult.ddUsed}
              max={evalResult.ddAllowed}
              mode="risk"
              valueLabel={fmtPct((evalResult.ddUsed / (evalResult.ddAllowed || 1)) * 100)}
              capLabel={`${rules.maxOverallDrawdownPct}%`}
              sub={`${fmtUSD(evalResult.ddUsed)} drawdown of ${fmtUSD(evalResult.ddAllowed)} allowed`}
            />
            <TapeGauge
              label="Trading Days"
              value={evalResult.tradingDays}
              max={tradingDaysMax}
              mode="progress"
              valueLabel={`${evalResult.tradingDays}`}
              capLabel={rules.minTradingDays > 0 ? `${rules.minTradingDays} min` : 'none req.'}
              sub={rules.minTradingDays > 0
                ? `${Math.max(0, rules.minTradingDays - evalResult.tradingDays)} more day(s) needed`
                : 'No minimum trading-day requirement.'}
            />
          </div>

          {/* Consistency check */}
          <div className="rounded-lg p-4" style={{ background: C.panel, border: `1px solid ${C.border}` }}>
            <div className="flex items-center gap-2 mb-3">
              <div className="text-[11px] uppercase tracking-[0.2em]" style={{ color: C.textDim }}>Consistency Check</div>
              <span className="text-[9px] font-bold px-1.5 py-0.5 rounded tracking-widest" style={{ background: `${C.amber}22`, color: C.amber }}>PRO</span>
            </div>
            <ProGate unlocked={licenseUnlocked} title="Consistency tracking is a Pro feature" onUnlock={() => setTab('settings')}>
              {consistency.consistencyPct == null ? (
                <div className="text-sm" style={{ color: C.textDim }}>
                  Becomes available once the account is net profitable and has at least one profitable trading day.
                  Many firms cap how much of total profit a single day may account for before payout — typically 40-50%.
                </div>
              ) : (
                <>
                  <p className="text-xs mb-3 leading-relaxed" style={{ color: C.textDim }}>
                    Best day ({consistency.bestDayDate}) made <span style={{ color: C.text, fontFamily: FONT_MONO }}>{fmtUSD(consistency.bestDayProfit)}</span> —
                    that's <span style={{ color: C.text, fontFamily: FONT_MONO }}>{fmtPct(consistency.consistencyPct)}</span> of total profit
                    ({fmtUSD(consistency.totalProfit)}). Many firms require this to stay under 40-50% of total profit before payout —
                    verify the exact figure in your firm's rulebook.
                  </p>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <TapeGauge
                      label="40% Consistency Rule"
                      value={consistency.consistencyPct}
                      max={40}
                      mode="risk"
                      valueLabel={fmtPct(consistency.consistencyPct)}
                      capLabel="40%"
                      sub={consistency.consistencyPct <= 40 ? 'Within a 40% consistency cap.' : 'Exceeds a 40% consistency cap.'}
                    />
                    <TapeGauge
                      label="50% Consistency Rule"
                      value={consistency.consistencyPct}
                      max={50}
                      mode="risk"

                <select className={inputClass} style={{ ...inputStyle, fontFamily: FONT_BODY }} value={rules.drawdownType} onChange={e => setRules({ ...rules, drawdownType: e.target.value })}>
                  <option value="static">Static (from start balance)</option>
                  <option value="trailing">Trailing (from peak balance)</option>
                </select>
              </div>
            </div>

            <div>
              <div className="flex items-center justify-between mb-1">
                <FieldLabel>Max daily loss (%)</FieldLabel>
                <label className="flex items-center gap-1.5 text-[11px]" style={{ color: C.textDim }}>
                  <input type="checkbox" checked={rules.maxDailyLossPct != null}
                    onChange={e => setRules({ ...rules, maxDailyLossPct: e.target.checked ? 5 : null })} />
                  Enabled
                </label>
              </div>
              <input type="number" step="0.5" className={inputClass} style={inputStyle}
                disabled={rules.maxDailyLossPct == null}
                value={rules.maxDailyLossPct ?? ''}
                onChange={e => setRules({ ...rules, maxDailyLossPct: parseFloat(e.target.value) || 0 })} />
            </div>
          </div>

          {/* Pro license */}
          <div className="rounded-lg p-5 space-y-4 lg:col-span-2" style={{ background: C.panel, border: `1px solid ${C.border}` }}>
            <div className="flex items-center justify-between gap-3 flex-wrap">
              <div className="flex items-center gap-2">
                <div className="text-sm font-semibold" style={{ fontFamily: FONT_DISPLAY }}>Pro License</div>
                {licenseUnlocked ? (
                  <span className="flex items-center gap-1 text-[11px] font-semibold px-2 py-0.5 rounded-full" style={{ background: `${C.green}1A`, color: C.green, border: `1px solid ${C.green}55` }}>
                    <CheckCircle2 size={12} /> Unlocked
                  </span>
                ) : (
                  <span className="flex items-center gap-1 text-[11px] font-semibold px-2 py-0.5 rounded-full" style={{ background: `${C.amber}1A`, color: C.amber, border: `1px solid ${C.amber}55` }}>
                    <Lock size={12} /> Locked
                  </span>
                )}
              </div>
              <a href={PRO_CHECKOUT_URL} target="_blank" rel="noopener noreferrer"
                className="text-xs font-semibold px-3 py-2 rounded-md whitespace-nowrap" style={{ background: C.amber, color: '#1A1404' }}>
                Get Pro
              </a>
            </div>

            <div className="text-xs leading-relaxed" style={{ color: C.textFaint }}>
              Pro unlocks the Consistency Check (40%/50% rules), the Performance Coach, and the recommended
              max-risk-per-trade calculator. Enter the license key from your purchase confirmation email below.
            </div>

            <div className="flex flex-col sm:flex-row gap-2">
              <input
                type="text"
                placeholder="XXXX-XXXX-XXXX-XXXX"
                className={`${inputClass} flex-1`}
                style={inputStyle}
                value={licenseKey}
                onChange={e => setLicenseKey(e.target.value)}
                disabled={licenseUnlocked}
              />
              {licenseUnlocked ? (
                <button onClick={removeLicense} className="text-sm px-4 py-2 rounded-md font-semibold whitespace-nowrap" style={{ background: C.panel2, color: C.textDim, border: `1px solid ${C.border}` }}>
                  Remove license
                </button>
              ) : (
                <button onClick={verifyLicense} className="text-sm px-4 py-2 rounded-md font-semibold whitespace-nowrap" style={{ background: C.amber, color: '#1A1404' }}>
                  Unlock
                </button>
              )}
            </div>

            {licenseMessage && (
              <div className="text-xs px-3 py-2 rounded-md" style={{
                background: licenseMessage.type === 'error' ? `${C.red}1A` : `${C.green}1A`,
                color: licenseMessage.type === 'error' ? C.red : C.green,
                border: `1px solid ${licenseMessage.type === 'error' ? C.red : C.green}55`,
              }}>
                {licenseMessage.text}
              </div>
            )}

            <div className="text-[11px] leading-relaxed" style={{ color: C.textFaint }}>
              License keys are checked locally in your browser and stored only on this device. No account or
              personal data is sent anywhere.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
